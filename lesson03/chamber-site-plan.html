    <h2>Overview</h2>
    <h3>Purpose</h3>
    <p>The site will a commercial chamber with membership signing in and up option to allow different artist have access to exclusive art shows and also act a platform to showcase their talents. It will also serve as a directory of authentic artist directory to enable have a big reach to potential customers who want customized projects done in the art sector. As well as serve as a place investor can partner creatives in bringing to life their vision through funding.</p>
    <!-- change this -->

    <h3>Location</h3>
    <p>The chamber site will be for Zimbabwe.</p>

    <h3>Audience</h3>
    <p>Creative individuals who seek for their art to be exposed, Investors who want to finance creatives, Art lovers who want to buy art pieces or want to have customized art pieces, art curators, festival coordinators and corporate organization who need help of creatives build their brands.</p>
