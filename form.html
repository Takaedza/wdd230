    <header>
        <a id="pic_link" href="index.html">

        </a>
        <h1>Takaedza Godfrey Mandinyenya</h1>
    </header>
    <main>
        <picture>
            <div id="hero-box">
                <img
                  class="hero-img"
                  src="images/bangkok_thailand_temple_exteriors.webp"
                  alt="Tapping in the world of creatives"
                >
              </div>
        </picture>
        <button id="menu"></button>
        <nav class="navigation">
            <a href="index.html">Home</a>

        <div id="formmessage"></div>
        <h2>Please fill the form.</h2>
        <form method="get" action="record.html" class="suf">
            <fieldset>
                <legend>Signup Information</legend>
                <label>Username* <input type="text" id="username" name="username" required></label>
                <label>Password* <input type="password" id="pwd" name="pwd" pattern="[a-zA-Z -]{8,}" placeholder="At least eight characters long. No numbers." required></label>
                <label>Re-enter Password* <input type="password" id="pwd2" name="pwd2" required></label>
                <label>Email* <input type="email" id="email" name="email" placeholder="Your byui email address" pattern="[a-zA-Z0-9_.\-]+@byui.edu" title="A valid byui.edu email address." required></label>
            </fieldset>

            <fieldset>
                <legend>Page Rating</legend>
                <label>How do rate this page on scale of 0 to 10
                    <div id="rangevalue">0</div>
                    <input type="range" id="r" name="r" min="0" max="10" value="0" step="1" list="rangevalues">
                    <datalist id="rangevalues">
                        <option value="0">0</option>
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                        <option value="4">4</option>
                        <option value="5">5</option>
                        <option value="6">6</option>
                        <option value="7">7</option>
                        <option value="8">8</option>
                        <option value="9">9</option>
                        <option value="10">10</option>
                    </datalist>
                    <div class="ref">
                        <a href="https://developer.mozilla.org/en-US/docs/Web/HTML/Element/input/range">MDN Input: Range</a>
                    </div>
                </label>
            </fieldset>
            <input type="submit" value="Signup">
        </form>
    </main>
